# Please see the documentation for all configuration options:
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  - package-ecosystem: 'github-actions'
    directories:
      - '/.github/actions/setup-environment'
      - '/'
    schedule:
      interval: 'daily'
    cooldown:
      default-days: 7

  - package-ecosystem: 'uv'
    directory: '/apps/api'
    schedule:
      interval: 'daily'
    cooldown:
      default-days: 7

  - package-ecosystem: 'pre-commit'
    directory: '/apps/api'
    schedule:
      interval: 'daily'
    cooldown:
      default-days: 7

  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'daily'
    cooldown:
      default-days: 7
    groups:
      commitlint:
        patterns:
          - '@commitlint/*'
      eslint:
        patterns:
          - 'eslint'
          - 'eslint-*'
          - '*-eslint-*'
          - '*/eslint-*'
          - '@eslint/*'
          - 'typescript-eslint'
      prettier:
        patterns:
          - 'prettier'
          - 'prettier-*'
          - '*/eslint-*'
          - '@prettier/*'
          - 'typescript-eslint'
      tailwind:
        patterns:
          - 'tailwindcss'
          - '@tailwindcss/*'
          - 'tailwindcss-*'
      svelte:
        patterns:
          - 'svelte'
          - 'svelte-*'
          - '@sveltejs/*'
      vite:
        patterns:
          - 'vite'
          - 'vite-*'
          - '@vitejs/*'
          - 'vitest'
          - '@vitest/*'

  - package-ecosystem: 'docker'
    directories:
      - '/apps/api'
      - '/'
    schedule:
      interval: 'daily'
    cooldown:
      default-days: 7

  - package-ecosystem: 'docker-compose'
    directory: '/'
    schedule:
      interval: 'daily'
    cooldown:
      default-days: 7
