# Please see the documentation for all configuration options:
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  - package-ecosystem: "github-actions"
    directories:
      - "/.github/actions/setup-environment"
      - "/"
    schedule:
      interval: "weekly"
    assignees:
      - "jordanshatford"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directory: "/apps/api"
    schedule:
      interval: "weekly"
    assignees:
      - "jordanshatford"
    groups:
      python:
        patterns:
          - "*"

  - package-ecosystem: "pre-commit"
    directory: "/apps/api"
    schedule:
      interval: "weekly"
    assignees:
      - "jordanshatford"
    groups:
      pre-commit:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    assignees:
      - "jordanshatford"
    groups:
      npm:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directories:
      - "/apps/api"
      - "/"
    schedule:
      interval: "weekly"
    assignees:
      - "jordanshatford"
    groups:
      docker:
        patterns:
          - "*"

  - package-ecosystem: "docker-compose"
    directory: "/"
    schedule:
      interval: "weekly"
    assignees:
      - "jordanshatford"
    groups:
      docker:
        patterns:
          - "*"
